body:
  text: 優古堂詩話宋吴幵撰詩可以觀人吕獻可誨嘗云丁謂詩有天門九重開終當掉臂入王元之禹偁見之曰入公門猶鞠躬如也天門豈可掉臂入乎此人必不忠後果如其言二十八字媒白藕作花風巳秋不堪殘睡更囘頭晚雲帶雨歸飛急去作西窓一夜愁此趙徳麟細君王氏所作也徳麟既鰥居因見此篇遂與之為親余以為二十八字媒也野火燒不盡樂天初舉名未振以歌詩投頋况况戯之曰長安物貴居大不易及讀至原上草云野火燒不盡春風吹又生曰有句如此居亦何難老夫前言戯之耳絶句仲至王欽臣使遼囘謁恭敏李公席中賦詩云穹廬三月巳淹留白草黄雲見即愁滿袖塵埃何處洗李家池上海棠洲山谷取唐人詩唐宋晝喜陳懿老至詩云一别一千日一日十二憶苦心無閑時今日見玉色乃知山谷五更歸夢三百日一日思親十二時之句取此謝恵含桃謝恵茶詩韓致光昭宗時以翰林承㫖謫嶺表道湖南謝人恵含桃詩末章云金鑾嵗嵗常宣賜忍淚看天憶帝都自注云每嵗初進之後先宣賜學士韓子蒼謝人恵茶云白髮前朝舊史官風爐煑茗暮江寒蒼龍不復従天下拭淚看君小鳳團自註云史官月賜龍團意雖本致光而語工門雀屋烏宣室茂林張天覺既相謝表有云十年去國門前之雀可羅一日歸朝屋上之烏亦好徽宗親題扵所御扇然丁晉公詩固嘗云屋可占烏曾貴仕門堪羅雀稱衰翁矣王元之黄州上任謝表云宣室鬼神之問敢望生還茂陵封禪之書已期身後亦出于杜子美竟無宣室召徒有茂陵求之語前輩不以為嫌者盖文勢事情自須如此也相望落落如星辰王直方詩話謂東坡送李公擇云有如長庚月到曉不收明贈參寥云故人各在天一角相望落落如星辰任師中挽詞云相看半作星辰没可憐太白與殘月而蘇黄門送退翁守懐安亦云我懐同門客勢若曉天星其後學者尤多用此以上皆王說余按古樂府徐朝云兩頭纎纎月初生半黒半白眼中精腷腷膊膊雞初鳴磊磊落落向曙星故劉夢得作韋處厚集序亦云古今相望落落然如騎星辰乃知二蘇所用本古樂府豈直方忘之耶猿啼三聲淚沾衣川峡記行者歌曰巴東三峡猿鳴悲猿啼三聲淚沾衣故古樂府有巫峡長猿鳴三聲淚沾裳陳蕭詮夜猿啼詩斷章云别有三聲淚沾裳竟不窮故子美詩聴猿實下三聲淚身輕一鳥過歐陽公詩話陳公時得杜集至送蔡都尉詩身輕一鳥下脫一字數客補之各云疾落起下終莫能定後得善本乃是過字其後東坡詩如觀老杜飛鳥句脫字欲補知無縁山谷詩百年青天過鳥翼東坡詩百年同過鳥亦従而效之也余見張景陽詩云人生瀛海内忽如鳥過目則知老杜盖取諸此况杜又有貺栁少府詩余生如過鳥又云愁窺髙鳥過景陽之詩梁氏取以入選杜贈驥子詩熟精文選理則其所取亦自有本矣如贈韋左丞詩皆倣鮑眀逺東武吟主人且勿喧賤子歌一言然古詠香爐詩四座且勿喧願聽歌一言牛帶寒鵶過逺村張芸叟詩夕陽牛背無人卧帶得寒鵶兩兩歸與東坡所記蘇叔黨詩葉随流水歸何處牛帶寒鵶過别村與張詩相類學詩如學仙時至骨換鮑慎由答潘見素詩云學詩比登仙金膏換凡骨盖用陳無已答秦少章學詩如學仙時至骨自換之句水従樓前来中有美人淚晁元忠西歸詩安得龍山潮駕囘安河水水従樓前来中有美人淚山谷和答云熱避惡木隂渇辭盗泉水曽囘聖母車不落抱玉淚晁氏猛虎行皦皦壮士意人生髙唐觀有情何能已韓子蒼取其意以代葛亞卿作詩云君住江濵起柁樓妾居海角送潮頭潮中有妾相思淚流到樓前更不流唐叔孫向有經昭應温泉詩云一道泉流遶御溝先皇曾向此中㳺雖然水是無情物也到宫前咽不流子蒼末句乃用孫語到海止十里過山應萬重青箱雜記謂冦莱公少時有詩送人云到海止十里過山應萬重遂兆晚年之䜟余以為非是盖莱公效于武陵詩耳于别故人云過楚水千里到秦山幾重然國史莱公本傳乃云凖至雷州吏以圖經獻視其四至云東南門至海岸十里凖怳然曰吾少時有云到海祇十里過山應萬重豈偶然耶所載與青箱雜記不同金鴨無煙却有香秦少章詩燭花漸暗人初睡金鴨無煙却有香魏道輔詩博山燒沉水煙燼氣不滅日暮白門前楊花散成雪與少章詩意同友于洪駒父詩話謂世以兄弟為友于子姓為貽厥歇後語也杜子美詩云山鳥山花皆友于子美未能免俗何耶子以為不然按南史劉湛友于素篤北史李謐事兄盡友于之誠故陶淵眀詩云一欣侍温顔再喜見友于子美盖有所本耳子美上太常張卿詩亦云友于皆挺拔横陳荆公詩日髙青女尚横陳潮囘洲渚得横陳横陳二字首見楞嚴經及宋玉風賦前輩以用横陳始于荆公非也陸龜䝉薔薇詩云倚墻當户自横陳致得貧家似不貧沈約夢見美人詩云立望復横陳忽覺非在側見玉臺新詠據槁梧荆公詩各據槁梧同不寐偶然聞雨落階除唐李嘉祐詩據梧聴好鳥行藥寄名花荘子據槁梧而瞑崔䕶詩唐獨孤及和贈逺詩云憶得去年春風至中庭桃李映瑣窓美人鼓瑟對芳樹玉顔亭亭與花雙今年新花如舊時去年美人不在兹借問離居恨深淺祇應獨有庭花知此詩與崔䕶詩意無異幾度雨来成惡熱一畨風過有新凉李泰伯詩云幾度雨来成惡熱一畨風過有新凉劉莘老子劉企字斯立龍山寺詩亦云急雨欲来先暑氣凉風已過却秋聲詩意雖同然皆佳句青裙白靣初相識陳去非茶花詩後兩句云青裙白面初相識十月茶花滿路開盖用白樂天江岸梨花詩意梨花有思緑和葉一樹江頭惱殺君最似孀閨少年婦白粧素面白紗裙手滑蘇子由龍川别志慶歴中刦盗張海將過髙郵知軍姚仲約度不能禦喻軍中富民出金帛市牛酒使人迎勞且厚遺之海恱徑去不為暴富鄭公議欲誅仲約范文正欲宥之争扵上前仁宗従之富公愠曰方今患法不舉而多方沮之何以整衆范公宻告之曰祖宗以来未嘗輕殺臣下此盛徳事奈何欲輕壊之且吾與公在此同僚之間同心者有幾雖上意亦未知所定也而輕導人主以誅戮臣下他日手滑雖吾輩亦未敢自保也富公終不以為然及二公跡不安范公出按陕西富公出按河北范公因自乞守邊富公自河北還及國門不許入未測朝廷意此夜徬徨不能寐遶牀歎曰范六丈聖人也余考資治通鑑唐武宗賜劉宏逸薛季稜死又遣使就潭州誅楊嗣復及李珏杜悰奔馬見李徳裕曰天子少年新即位兹事不宜手滑徳裕因與崔珙崔鄲陳夷行三上奏乃釋之乃知范公所言者楊嗣復等公案耳世有肆行胷臆者多以紙上語為不足用以今觀之是否盖可見矣觀木興歎魏文帝栁賦在余年之二七植斯栁扵中庭始圍寸而髙尺今連拱而九成桓温北伐經金城見為瑯琊時種栁皆已十圍慨然曰朩猶如此人何以堪乃知觀木而興嘆代有之矣按廣人物志載蘇頲年五嵗裴談過其父試誦庾信枯樹賦頲避談字易其韻曰昔年移栁依依漢隂今看揺落悽愴江潯樹猶如此人何以任文忠公詩云人昔共逰今孰在樹猶如此我何堪荆公詩道人従西来問松我東崗舉手指屋脊云如如許長劉斯立詩云麥壠漫漫宿藁黄新苖寸寸未禁霜手中馬箠餘三尺想見歸時如許長意皆相沿以生也金谷樓危到地香前輩稱宋莒公賦落花詩其警句有漢皋珮冷臨江失金谷樓危到地香之句盖本扵唐張泌惜花詩看多記得傷心事金谷樓前委地時其弟景文公同賦云將飛更作囘風舞已落猶成半面粧亦本扵李賀殘絲曲云落花起作囘風舞榆荚相催不知數春在先生杖履中西清詩話云周邦彦祝夀詩化行禹貢山川外人在周公禮樂中余以為此乃模冩東坡刁景純蔵春塢詩年抛造物甄陶外春在先生杖履中是也小雨班班文忠公詩小雨班班作燕泥東坡詩小雨班班未作泥山谷詩潤花小雨土班班一意兩用樂天自従苦學空門法銷盡平生種種心惟有詩魔降未得每逢風月一閒吟又云人各有一癖我癖在章句萬縁皆巳銷此病獨未去此意凡兩用也太白舉杯邀明月對影成三人又云獨酌勸孤影此意凡兩用也然太白本取淵明揮杯勸孤影之句蜀葵詩劉禹錫嘉話載陳標蜀葵詩能共牡丹争幾許得人憎處只縁多雜爼載貞元中牡丹已多栁渾詩言近来無奈牡丹何數十千錢買一窠今朝始得分明見也共戎葵較幾多二詩意相似屋簷斜入一枝低唐張謂詩櫻桃觧結垂簷子楊栁能低入户枝迺悟林和靖梅詩屋簷斜入一枝低之句所本秋去暑無權張文潜明道雜志記一詩云秋去暑無權以為意新而韻工予見邵堯夫云春陽得權故多旱秋隂得權故多雨醉鄉閑處日月鳥語花間管絃蔡絛西清詩話云黄魯直貶宜州謂其兄元明曰庭堅年老矣始悟抉章摘句為難要當于古人不到處留意乃能聲出衆上元明問其然曰庭堅六言近詩醉鄉閑處日月鳥語花間管絃是也此優入詩家藩閫宜其名世如此以上皆蔡語余按此說出扵魯直是否雖未敢必然上句本扵唐皇甫松醉鄉日月發之意下句本於唐崔湜應制詩庭際花飛錦繡合枝間鳥囀管絃同門外緑楊春繫馬牀前紅燭夜呼盧晏叔原長短句云門外緑楊春繫馬牀前紅燭夜呼盧盖用樂府水調歌云户外碧潭春洗雨樓前紅燭夜迎人然叔原之詞甚工雲破月来花弄影張子野長短句雲破月来花弄影徃徃以為古今絶唱然予讀古樂府唐氏瑶暗别離云朱絃暗斷不見人風動花枝月中影意子野本此應聲蟲陳正敏遯齋閑覽載楊勔中年得異疾每發言應答腹中有小聲效之數年間其聲寖大有道士見而驚曰此應聲蟲也久不治延及妻子宜讀本草遇蟲不應者當取服之勔如言讀至雷丸蟲忽無聲乃頓餌數粒遂愈正敏其後至長汀遇一丐者亦有是疾環而觀者甚衆因教之使服雷丸丐者謝曰某貧無他技所以求衣食于人者惟藉此耳以上皆陳所記予讀唐張鷟朝野僉載云洛州有士人患應病語即喉中應之以問善醫張文仲張經夜思之乃得一法即取本草令讀之皆應至其所畏不言乃録取藥合和為丸服之應時而止乃知古有是事草忘憂花含笑冷齋夜話云丁晉公草觧忘憂憂底事花能含笑笑何人不若東坡花如識靣嘗含笑鳥不知名時自呼然丁詩本取唐人徐振雷塘詩花憶所為猶自笑草知無道更應荒毛詩焉得諼草釋者以諼草可以觧人之憂耳今丁詩乃以草憂底事何耶然善論詩者不當如此回眸一笑百媚生白樂天長恨歌云回眸一笑百媚生六宫粉黛無顔色盖用李太白應制清平樂詞云女伴莫話孤眠六宫羅綺三千一笑皆生百媚宸逰敎在誰邊身事未知何日了近時稱陳去非詩案上簿書何日了樓頭風月又秋来之句或者曰此東坡官事無窮何日了菊花有信不吾欺耳予以為本唐人羅鄴僕射陂晚望詩身事未知何日了馬蹄惟覺到秋忙舜不窮其民論元祐中省試舜不窮其民論劉棠召美首選其警句云桀紂以淫虐窮幽以貪殘窮厲以監謗窮戰國以侵伐窮秦皇以督責窮漢武以奢侈窮晉以夷狄窮隋以巡幸窮明皇以隠户剰田窮徳宗以間架稅屋窮東坡見之大加嘆賞以其不類時文因以劉窮呼之然予以劉召美此意本孫樵耳孫樵與賈秀才書云楊雄以法言太元窮元結以浯溪碣窮陳拾遺以感遇詩窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也望斗氣沉龍巳化置芻人去榻猶懸豫章事實王勃序之詳矣題詠此邦者徃徃採之晏元獻云望斗氣沉龍已化置芻人去榻猶懸陶邕川云劍待張華時已晚榻延徐孺禮應疎此二聨全是龍光射牛斗之墟徐孺下陳蕃之榻也宋綬公垂云江涵帝子翬飛閣山際真君鶴馭天不襲陳迹甚可佳也處事無心覺累輕東莱先生吕居仁詩云忍窮有味知詩進處事無心覺累輕李成季巳嘗云静疑多事非求福老覺無心勝攝生二詩雖相似然皆佳作也春水碧於天温庭筠樂府春水碧於天畫船聽雨眠皮日休松陵集詩云漢水碧扵天南荆廓然秀豫章取以作演雅云江南野水碧於天中有白鷗閑似我蓬生麻中荀卿曰蓬生麻中不扶而直蘭槐之根是為芷其漸之滫盖本於曾子制言曰蓬生麻中不扶乃直白砂和泥與之皆黒蓄不吠之犬東坡上神宗書曰養猫以待䑕不可以無䑕而蓄不捕之猫蓄犬以防姦不可以無姦而蓄不吠之犬盖取北史宋逰道傳楊遵彦曰譬之蓄狗本取其吠今以數吠殺之恐将来無復吠狗開簾風動竹唐李益竹窓聞風早發寄司空曙詩云微風驚暮坐牕牖思悠哉開門復動竹疑是故人来時滴枝上露稍霑堦上苔幸當一入幌為拂綠琴埃異聞集霍小玉傳為開簾風動竹改一風字遂失詩意然此句乃襲樂府華山畿詞耳詞云夜相思風吹窓簾動言是所歡来通典云江南以情人為歡山流細沫擁浮花沈君攸羽觴飛上苑云石徑斷絲䦨蔓草山流細沫擁浮花外史檮杌載張蠙詩墻頭細雨垂纎草水靣囘風聚落花盖本扵沈耳桃花亂落如紅雨李長吉有桃花亂落如紅雨之句以此名世余觀劉禹錫詩云花枝滿空迷處所揺落繁英墜紅雨劉李同出一時决非相為剽竊目極千里傷春心陸士衡樂府㳺客春芳林春芳傷客心杜子美花近髙樓傷客心皆本屈原目極千里傷春心漁梁渡口争渡喧岑參巴南舟中夜事詩云渡口欲黄昏歸人争渡喧盖用孟浩然詩耳浩然有夜歸鹿門寺歌云山寺鳴鍾晝巳昏漁梁渡口争渡喧多病故人疎唐包佶嶺下卧疾寄劉長卿詩云惟有貧兼病能令親愛踈盖用孟浩然多病故人疎與杜子美故知貧病人須棄能使韋郎跡也踈船如天上坐人似鏡中行潘子真詩話云船如天上坐人似鏡中行又船如天上坐魚似鏡中懸沈雲卿詩也杜子美詩云春水船如天上坐老年花似霧中看盖觸類而長之余以雲卿之詩盖源於王逸少鏡湖詩所謂山隂路上行如在鏡中㳺之句然李白入青溪山詩亦云人行明鏡中鳥度屏風裏雖有所襲然語益工也鶯語丁寧唐楊巨源早春詩云馬蹄經歴應須遍鶯語丁寧巳怪遲盖效杜子美所謂莫遣花開深造次便教鶯語太丁寧幾處笙歌幾處愁唐章孝標八月詩云徙倚仙居遶翠樓分明宫漏静兼秋長安夜夜家家月㡬處笙歌㡬處愁唐裴交泰長門怨詩云自閉長門經㡬秋羅衣濕盡淚還流一種蛾眉明月夜南宫歌管北宫愁與前詩絶相類榖雨杏花稀唐李嘉祐春思詩清明桑葉少榖雨杏花稀乃悟周朴詩曉来山鳥閙雨過杏花稀未臘山梅樹樹花杜牧之詩經冬野菜青青色未臘山梅樹樹花許渾詩未臘梅先實經春草自薰渾雖用牧意然終不能及也庭中花照眼梁武帝春歌曰階上香入懐庭中花照眼春心一如此情来不自限乃悟杜子美詩花枝照眼句還成之句授圖黄石老學劍白猿翁潘子真詩話云杜牧之題李西平宅云授圖黄石老學劍白猿翁庾信作宇文盛墓誌所謂授圖黄石不無師表學劍白猿遂傳風㫖然余讀李太白贈宋中丞詩云白猿慙劍術黄石借兵符則太白亦嘗用之矣還山弄明月東坡䖍州八境圖囘峯亂嶂鬱參差雲外髙人世得知誰向空山弄明月山中木客觧吟詩徐鼎臣搜神記云鄱陽山中有朩客秦時採朩者食朩實遂得不絶時就民間飲酒為詩一章云酒盡君莫沽壺傾我當發城市多囂塵還山弄明月東坡盖用此也然唐劉長卿有龍門八詠其七渡水詩云日暮下山来千山暮鐘發不如波上棹還弄山中月伊水連白雲東南逺明滅乃知還山弄明月唐人巳言之矣退之全用列子文韓退之襍說云昔之聖人者其首有若牛者其形有若虵者其喙有若鳥者其貌有若䝉倛者彼皆貌似而心不同焉可謂之非人耶有平脅曼膚顔如渥丹美而狠者其靣則人其心則禽獸又烏可謂之人耶余按列子稱包犧氏女媧氏神農氏夏后氏虵身人靣牛首虎鼻此有非人之状而有大聖之徳夏商桀紂魯威楚穆状貌七竅皆同於人而有禽獸之心而衆人守一以求至智未可㡬也迺知退之全用此文愁殺人唐朱放送魏校書詩云長恨江南足别離幾囘相送復相随楊花撩亂撲流水愁殺行人知不知李益隋堤詩云碧水東流無限春隋家宫苑已成塵行時莫上長堤望吹起楊花愁殺人李盖學朱也然二詩皆佳詠婦人多以歌舞為稱古今詩人詠婦人者多以歌舞為稱梁元帝妓應令詩云歌清随澗響舞影向池生劉孝綽看妓詩云燕姬奏妙舞鄭女愛清歌北齊蕭放冬夜對妓詩云歌還團扇後舞出妓行前𢎞執恭觀妓詩云合舞俱囘雪分歌共落塵陳隂鏗侯司空宅詠妓詩云鶯啼歌扇後花落舞衫前陳劉􅄼亦云山邊歌落日池上舞前溪庾信和趙王看妓詩云綠珠歌扇薄飛燕舞衫長江捴看妓詩云並歌時轉黛息舞暫分香隋盧思道夜聞隣妓詩云怨歌聲易斷妙舞態難雙陳李元操春園聽妓詩云紅樹揺歌扇綠珠飄舞衣釋法宣觀妓詩云早時歌扇薄今日舞衫長劉希夷春日閨人詩云池月憐歌扇山雲愛舞衣以歌對舞者七以歌扇對舞衣者亦七雖相沿以起然詳味之自有工拙也杜子美取以為艶曲云江清歌扇底野曠舞衣前花應觧笑人無窮事有限身唐李敬方歡醉詩云不向花前醉花應觧笑人只因連夜雨又過一年春日日無窮事區區有限身若非盃酒裏何以寄天真杜子美絶句云二月巳破三月来漸老逢春能㡬囘莫悲身外無窮事且盡生前有限盃二詩雖相沿而杜則尤工者也世所傳相逢不飲空歸去洞口桃花也笑人之句盖出扵敬方云洞房懸月影髙枕聽江流張說有深度驛詩云洞房懸月影髙枕聽江流杜子美用其意見於客夜篇云入簾殘月影髙枕逺江聲雞三號韓退之詩雞三號更五㸃盖雞必三號而後天曉耳故杜子美雞詩亦云紀徳名標五初鳴度必三獨鵲裊庭柯錢内翰希白晝景詩雙蜻上簾額獨鵲裊庭柯裊字最其所用意處也然韋蘇州聽鶯曲云有時斷續聽不了飛去花枝猶裊裊趙嘏詩云語風雙燕立裊樹百勞飛錢意韋趙已先用張文潛亦有啄雀踏枝飛尚裊之句兩蝸角白樂天云相争兩蝸角所得一牛毛後之使蝸角事悉稽之而偶對各有所長吕吉甫云南北戰争蝸兩角古今興廢貉同邱山谷云千里追奔兩蝸角百年得意大槐宫又云功名富貴兩蝸角險阻艱難一酒盃洪龜父云一朝厭蝸角萬里騎鯨背誰謂天地寛孟東野出門如有礙誰謂天地寛吴處厚以渠器量褊窄言乃爾余以東野取法杜子美每愁悔吝生如覺天地窄之句韓退之春雪詩韓退之春雪詩拂花輕尚起落地暖初消秦韜玉雪詩云片纔落地輕輕陷力不禁風旋旋消王定民雪詩天邊宻勢来猶濕地上微和積易消耕田欲雨刈欲晴去得順風来者怨東坡泗州僧伽塔詩耕田欲雨刈欲晴去得順風来者怨若使人人禱輙應造物應須日千變張文潛用其意别為一詩云山邊半夜一犂雨田父髙歌待收穫雨多瀟瀟蠺簇寒蠺婦低眉憂繭單人生多求復多怨天公供爾良獨難天北極殿中間王直方詩話記徐師川紫宸早朝詩内一聨云黄氣逺臨天北極紫宸位在殿中央以余觀之迺全是杜子美玉几猶来天北極朱衣只在殿中間一聨也飛鳥外夕陽西張文潛詩云新月已生飛鳥外落霞更在夕陽西盖用郎士元送楊中丞和番詩耳郎詩云河源飛鳥外雪嶺大荒西韓退之喜雪詩韓退之喜雪獻裴尚書詩云喜深將策試驚宻仰簷窺又云氣嚴當酒暖洒宻聴窓知荆公全用以為一聫云借問火城將䇿試何如雪屋聽窓知一樹髙花明逺村田家汩汩流水渾一樹髙花明逺村雲意不知殘照好却将㣲雨送黄昏鄭毅夫詩也春隂垂野草青青時有幽花一樹明晚泊孤舟古祠下滿川風雨看潮生蘇子美詩也第二句相類然皆清絶可愛石燕泥龍周庾信喜晴詩已歡無石燕彌欲棄泥龍又初晴詩云燕燥還為石龍殘更是泥此意凡兩用然前一聨不及後一聨也乃知杜子美紅飯啄餘鸚鵡粒碧梧棲老鳳凰枝斡旋句法所本春風自是人間客侯鯖録載裕陵喜晏叔原與鄭侠絶句云小白長紅又滿枝築毬場外獨支頤春風自是人間客主管繁華得幾時然山谷少時有感春詩云風光不長妍如客暫時寓則晏意山谷已道之矣自是桃花貪結子錯敎人恨五更風陳輔之詩話記荆公喜王建宫詞樹頭樹底覔殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風韓子蒼反其意而作詩送葛亞卿曰劉郎底事去匆匆花有深情只暫紅弱質未應貪結子細思須恨五更風詠叔孫通詩宋景文詠叔孫通詩云馬上功成不喜文叔孫緜蕝彊經綸諸君可笑貪君賜便許當時作聖人王逢原詠叔孫通亦用此意云弟子由来亦未純異時得失亦頻頻一官所買知多少便議先生作聖人其用意正同今荆公亦載宋詩非也魚遺子鹿引麛唐吴子華詩云暖􅃞魚遺子晴逰鹿引麛乃悟山谷詩河天月暈魚分子桐葉風㣲鹿養茸所自鱸肥人鱠玉柑熟客分金蘇子美詩笠澤鱸肥人鱠玉洞庭柑熟客分金吕吉父詩魚出清波庖鱠玉菊含寒露酒浮金姬人薦初醖㓜子問殘疾江搃衡州九日詩姬人薦初醖㓜子問殘疾故杜子美取其意以為遣悶云老妻憂坐痺㓜女問頭風傀儡唐梁鍠詠朩老人詩刻朩牽絲作老翁雞皮鶴髮與真同須臾弄罷寂無事却似人生一夢中開天傳信記稱明皇還蜀嘗以為誦而非明皇作也觀山谷詩世間盡被鬼神誤看取人間傀儡棚煩惱自無安脚處従他鼓笛弄浮生盖用鍠意也鳥歸花影動魚没浪痕圓前輩好稱僧悟清鳥歸花影動魚没浪痕圓以為句意皆新然余讀後梁沈君攸臨水詩云花落圎紋出風急細流飜迺知魚没浪圓所自鷓鴣飛上越王臺唐竇鞏有南逰感興詩傷心欲問當時事惟見江流去不囘日暮東風春草緑鷓鴣飛上越王臺盖用李太白覽古詩意也李云越王勾踐破吴歸義士還家盡錦衣宫女如花滿春殿只今惟有鷓鴣飛可人惟有秦淮月出没娟娟波浪中參寥詩可人惟有秦淮月出没姢姢波浪中東坡送蜀僧詩當年半破峩􅔞月還在平羗江水中二意偶同而東坡乃用李白詩禪心竟不起唐僧皎然答李季蘭詩云天女来相試將花欲染衣禪心竟不起還捧舊花歸乃悟參寥答杭妓詩禪心巳作沾泥絮肯逐東風上下狂隔花催喚打魚人劉貢父詩話載花蘂夫人宫詞云厨船進食簇時新列座無非侍従臣日午殿頭宣索膾隔花催喚打魚人余觀王建宫詞云御厨進食索時新每到花開便苦春白日卧多嬌似病隔簾教喚女醫人不惟第一句同而末章詞意皆相縁以起也髙懐猶有故人知陳無已有山谷草書絶句當年闕里與論詩嵗晚河山斷夢思妙質不為平世用髙懐猶有故人知末後兩句乃合荆公思王逢原詩妙質不為平世得㣲言但有故人知成梟而牟呼五白杜子美今夕行憑陵大呌呼五白袒跣不肯成梟盧學者謂杜用劉毅劉裕東府樗蒱事雖杜用此然屈原招魂已嘗云成梟而牟呼五白寒食疾風甚雨荆楚嵗時記去冬至一百五日即有疾風甚雨謂之寒食王君玉詩疾風甚雨青春老痩馬疲牛綠野深頃又見周知㣲詩藁云疾風甚雨悲㳺子峻嶺崇山非故鄉張文潛詩云荒山野水非吾土寒食清明似去年萬年枝唐上官儀詠雪詩幸因千里應還繞萬年枝謝元暉中書省詩風動萬年枝晏元獻詩萬年枝上凝煙動百子池邊瑞日長盧多遜太液池邊看月時好風吹動萬年枝王維史館山池云春池百子内芳樹萬年餘晏用此也萬年枝江左謂之冬青惟禁中則否韓子蒼冬青詩云離宫見爾近天墀雨露常私養種時惆悵一株嵐露裏無人識是萬年枝百子池見西京雜記戚夫人侍髙祖七月七日臨百子池何晏景福殿賦綴以萬年注引晉宫閣銘曰華林園萬年樹十四株問花花不語東坡吉祥賞花寄陳述古詩云仙花不用剪刀裁國色初酣夘酒来太守問花花不語為誰零落為誰開南部新書記嚴憚詩春光冉冉歸何處更向花前把一盃盡日問花花不語為誰零落為誰開東坡全用此兩句也憚字子重能詩與杜牧善夢中夢身外身山谷嘗自賛其真曰似僧有髮似俗無塵作夢中夢見身外身盖亦取詩僧淡白寫真詩耳淡白云已覺夢中夢還同身外身堪嘆余兼爾俱為未了人兩山排闥送青来荆公詩云一水護田将綠遶兩山排闥送青来盖本五代沈彬詩地隈一水廵城轉天約羣山附郭来彬又本唐許渾山形朝闕去河勢抱闗来之句太液披香西清詩話記荆公賞花釣魚詩披香殿上留珠輦太液池邊送玉盃都下翌日競以公用栁耆卿詞太液波飜披香簾捲之語余讀唐上官儀初春詩歩輦出披香清歌臨太液乃知上官儀已嘗對之豈始耆卿耶隋庾信春賦宜春苑中春已歸披香殿裏作春衣長安有宜春宫此又以宜春對披香矣日暮碧雲合佳人殊未来江文通有擬湯恵休詩云日暮碧雲合佳人殊未来盖用魏文帝秋胡行云朝與佳人期日夕殊不来梁武帝鼓角横吹曲云日落登雍臺佳人殊未来梁沈約洛陽道云佳人殊未来薄暮空徙倚二人所用又襲江也江齊人啼猿樹杜詩影著啼猿樹魂飄結蜃樓盖用盧照隣巫山髙云莫辨啼猿樹徒看神女雲時送紅梅一陣香李方叔喜吴可小詩東風可是閑来徃時送紅梅一陣香殊不知張芸叟酴醿詩亦云晚風亦自知人意時去時来管送香谷口未斜日數峯生夕隂蔡絛西清詩話取權僧谷口未斜日數峯生夕隂之句然唐宋之問詩云日落西山隂衆草起寒色權實取此沈約登元暢樓詩亦云雲生嶺乍黒日下溪半隂宋景文公過行慶闗詩云雲生全嶺失日隠半崖隂宋全用沈詩也梁庾肩吾詩云塵飛逺騎没日徙半峯寒庾沈同時人臨清流而賦詩陶淵明歸去来辭云登東皋以舒嘯臨清流而賦詩盖用嵇叔夜琴賦云背長林翳華芝臨清流賦新詩日月跳躑元㣲之遣興云日月東西跳又云光隂本跳躑又答胡靈之詩序云日月跳躑於今行二十年矣㡬與退之日月如跳丸大同小異也杜牧之寄韓又云跳丸日月十經秋又送孟池云月扵何處去日扵何處来跳丸相趂走盖用退之意元㣲之憶逺曲云水中書字無字痕白樂天新昌新居云浮榮水畫字意又相類海風吹不斷江月照還空頋况喜白樂天送友人原上草詩野火燒不盡春風吹又生乃是李太白瀑布詩海風吹不斷江月照還空堯舜性仁賦劉輝堯舜性仁賦其警句曰静而延年獨髙五帝之夀動而有勇形為四罪之誅盖本扵范文正堯舜率天下以仁賦内睦九族善隣之志咸和外黜四凶有勇之風遐振滿地江湖春入望連天章貢水争流徐師川有陪李泰發登洪州南樓詩云十年不復上南樓直為狂胡作逺逰滿地江湖春入望連天章貢水争流青雲聊爾居金馬紫氣還應射斗牛公是主人身是客舉觴登望得無愁唐劉長卿有和樊使君登潤州城樓詩云山城迢逓敞髙樓露冕吹鐃居上頭春草連天随北望夕陽浮水共東流江田漠漠全吴地野樹蒼蒼故楚州王粲尚為南郡客别来何處更銷憂徐之詩絶類長卿其間一聯如出一手也然宋仲安有放船下湖口詩云此地側身徒北望餘生乗興復東流乃是全用劉詩也韓退之學文而及道程正叔云韓退之晚年所為文所得甚多學本是修徳有徳然後有言退之却是倒學了因學文求所未至遂亦有所得然此意本吴子經耳子經法語曰古人好道而及文韓退之學文而及道子經名孝宗歐陽文忠公嘗有詩送吴生者也荆公與之論文甚著臨川人衰顔紅易借髮短白難遮程文簡公有飲酒戴花詩云衰顔紅易借髮短白難遮乃知陳無巳髮短愁催白顔衰酒借紅盖本諸此定命論東陽胡百能跋邵徳升分定録云先君嘗言人生所享厚薄各有定分世有以智力取者自謂已能徃徃不頋名義殊不知皆其分所固有初不可毫末加也所可加者徒得小人之名而不悟悲夫百能佩服斯訓未嘗不以語朋舊也以上皆胡百能說予按宋頋凱之常以為人禀命有定分非智力所移惟應恭已守道信天任運而闇者不達妄意僥倖徒虧雅道無闗得䘮乃以其言命弟子原著定命論以釋之乃知胡所說凱之之意也此心安處便是吾鄉東坡作定風波序云王定國歌兒曰柔奴姓宇文氏定國南遷歸余問柔廣南風土應是不好柔對曰此心安處便是吾鄉因用其語綴詞云試問嶺南應不好却道此心安處是吾鄉余嘗以此語本出扵白樂天東坡偶忘之耳白吾土詩云身心安處為吾土豈限長安與洛陽又出城留别詩云我生本無鄉心安是歸處又重題詩云心泰身寧是歸處故鄉可獨在長安又種桃杏詩云無論海角與天涯大抵心安即是家天際識歸舟梁王僧孺中川長望詩云岸際樹難辨雲中鳥易識盖全用謝元暉天際識歸舟雲中辨江樹而不及也梁元帝詩云逺村雲裏出遥船天際歸亦效元暉而逺勝僧孺庭草無人随意綠唐劉餗隋唐嘉話載隋煬帝為燕歌行群臣皆以為莫及王胄獨不下帝因此被害而帝誦其句云庭草無人随意綠能復道耶然予讀周庾信蕩子賦曰逰塵滿牀不用拂細草横階随意生乃知王胄庭草無人随意綠盖取諸此以之䘮命豈不枉哉玉斧修成寳月團荆公詩玊斧修成寳月團月邊仍有女乗鸞青冥風露非人世鬢亂釵横特地寒江淹詠扇詩畫作秦王女乗鸞向煙霧非止用蕭史事也玉斧事見酉陽雜爼綠楊樓外出秋千晁无咎評樂章歐陽永叔浣溪沙云堤上逰人逐畫船拍堤春水四垂天綠楊樓外出秋千要皆妙絶然只一出字自是後人道不到處余按唐王摩詰寒食城東即事詩云蹴踘屢過飛鳥上秋千競出垂楊裏歐公用出字盖本此雪裏梅将春信来前輩詩話稱李成季詩日邊雁帶臘寒去雪裏梅将春信来以為美然唐人曹松除夜已嘗云半夜臘因風捲去五更春被角吹来龍燭影中猶是臘鳳簫聲裏已吹春西清詩話謂蔡元長春貼子龍燭影中猶是臘鳳簫聲裏已吹春薦紳類能傳誦以為蔣穎叔作非也予以為此一聨全是方干除夜詩寒燈短㷔方燒臘畫角殘聲已報春富鄭公之言出於元璹東坡撰富鄭公神道碑載公奉使語曰且北朝與中國通好則人主専其利而臣下無所獲若用兵則利歸臣下而人主任其旤故北朝諸臣各勸用兵者此皆其身謀非國計也又曰契丹君臣至今誦其語守其約不忍叛者以其心曉然知通好用兵利害之所在也予按唐鄭元璹謂頡利曰漢與突厥風俗各異漢得突厥既不能臣突厥得漢復何所用且抄掠資財皆入將士在扵可汗一無所得不如和好國家必有重賚幣帛皆入可汗坐受利益頡利納其言即引還乃知鄭公之言皆出於元璹春風朝夕起吹緑日日深孟東野連州吟云春風朝夕起吹綠日日深乃悟荆公春風日日吹香草山北山南路欲無所自明月空為兩地愁雲齋廣録云二宋以文章齊名天下子京守蜀日有詩云碧雲謾有三年信明月空為兩地愁其後卒不入兩地人以為䜟予以子京用何遜與胡興安夜别詩念此一筵笑公為兩地愁廣録之論不知所自也馬嵬詩唐闕史稱鄭相畋吟馬嵬詩云明皇廻馬楊妃死雲雨雖亡日月新終是聖朝天子事景陽宫井又何人觀者以為真輔國之句予以為畋盖取杜詩不聞夏商衰中自誅褒妲之意寧人負我無我負人魏曹操有寧我負人無人負我之語本朝榮陽吕原明乃云中年嘗書壁以自警曰寧人負我無我負人後觀晁少傅碎金已前有此兩句所謂先得我心之所欲者然昔麴粥說羅仇以主上荒耄信讒不若勒兵向西平羅仇曰誠如汝言然吾家世以忠義著於西土寧使人負我我不忍負人也乃知晁少傅之前羅仇已有此語羅仇西凉羗胡耳能發此語猶可貴也見晉記細數落花因坐久緩尋芳草得歸遲前輩讀詩與作詩既多則遣辭措意皆相縁以起有不自知其然者荆公晚年閑居詩云細數落花因坐久緩尋芳草得歸遲盖本於王摩詰興闌啼鳥喚坐久落花多而其辭意益工也徐師川自謂荆公暮年金陵絶句之妙傳天下其前兩句與渠所作云細落李花那可數偶行芳草歩因遲偶似之邪竊取之耶喜作詩者不可不辨予嘗以為王因扵唐人而徐又因於荆公無可疑者但荆公之詩熟味之可以見其閑適優㳺之意至於師川則反是矣背秋轉覺山形瘦新雨還添水面肥雪浪齋日記云背秋轉覺山形痩新雨還添水靣肥漁隠叢話云山形痩之語古今少有道者予常記唐人一聨而㤀其名云山自古来和石痩水因秋後􅃞沙清前詩盖出於此而不及也張良與四皓書韓退之與李渤書商芸小說載張良所與商山四皓書曰良白仰惟先生秉超世之殊操身在六合之間志􅇒造化之表但自大漢受命禎靈顯集神母告符足以宅兆民之心先生當於此時耀神爽乎雲霄濯鳳翼於天漢使九門之外有非常之客北闕之下有神氣之賔而淵潛山隠竊為先生不取也良以頑薄承乏忝官所謂絶景不御而駕服駑駘方今元首欽明文思百揆之佐立則延首坐則引領日昃而方丈不御夜眠而閶闔不閉盖皇極須日月以揚光后土待嶽瀆以導滯而當聖世鸞鳳林棲不翔乎太清麒麟嶽遁不歩乎郊藪非所以寧八荒慰六合也不得侍省展布腹心略冩至言想望翻然不猜其意張良白余觀韓退之所與李渤書其規模歩驟逮與之為一矣蒨桃贈歌者詩翰府名談載冦莱公妾蒨桃贈歌者詩云一曲清歌一束綾美人猶似意嫌輕不知織女寒窓下幾度抛梭織得成予嘗記南唐李詢贈織錦詩云札札機聲曉復晡眼穿力盡意何如美人一曲成千賜心裏猶嫌花様疎蒨桃詩意本此而不及也山蟬帶響穿疎户前輩稱蘇子美詩山蟬帶響穿疎户野蔓延青入破窓盖出扵唐方干詩鶴盤逺勢投孤嶼蟬曵殘聲過别枝紅生白熟生碧熟紅侯鯖録云東坡謂世之對偶如紅生白熟手文脚色二對無復加也然予嘗記唐羅虬詩云窓前逺岫懸生碧簾外殘霞掛熟紅然則羅虬已用生碧對熟紅矣更無一箇是男兒前蜀王衍降後唐王承㫖作詩云蜀朝昏主出降時銜璧牽羊倒繫旗二十萬人齊拱手更無一箇是男兒其後花蘂夫人記孟昶之亡作詩云君王城上竪降旗妾在深宫那得知二十萬人齊觧甲寧無一箇是男兒陳無已詩話載之乃知沿襲之作沿襲不失為佳詩人有沿襲而不失為佳者張曙途中聞蟬前四句云毎嵗聽蟬處那将此際同孤村寒色裏野店夕陽中李中正聞子規前四句云何處正當聞聲聲欲斷魂暖風芳草岸殘日落花村蔣鈎孤鴈後四句云葦岸風吹雨沙汀月照霜還同我兄弟零落不成行薏苡芎藭張右史耒晝卧口占云病栽薏苡無勞謗濕要芎藭不待廋東坡亦云巧語屢曾傷薏苡廋辭那復託芎藭夢魂香黄季岑一士人詩云啼月杜鵑喉舌冷宿花蝴蝶夢魂香盖自唐趙嘏發之趙云松島鶴歸書信絶橘洲風起夢魂香二詩相類唐崔恵童宴城東荘詩云一月人生笑㡬囘相逢相值且啣杯眼看春色如流水今日花紅昨日開杜子美詩不須聞此意慘愴生前相遇且啣杯二詩相類第不知崔為何時人褒公鄂公杜子美贈曹將軍覇詩凌煙功臣少顔色將軍下筆開生面良相頭上進賢冠猛將腰間大羽箭褒公鄂公毛髮動英姿䬃爽来酣戰鄂公謂尉遲敬徳褒公謂叚志𤣥也故東坡贈冩真何充詩黄冠野服山家客意欲置我山巖中勲名將相今何限徃冩褒公與鄂公鮑慎由謝傳神蔡景直詩馳譽丹青有古風筆端及我未宜䝉雲臺麟閣遥相望徃冩褒公與鄂公用東坡語尤為無功三詩皆用清渾字東坡送魯元翰詩皎皎千丈清不如尺水渾陳後山次韻東坡詩信有千丈清不如一尺渾參寥詩乍為含垢千尋濁不作驚人一掬清詠荷花胡仔苕溪詩話以詞句欲全篇皆好極為難得如賀方囬淡黄楊栁帶棲鴉秦處度藕葉清香勝花氣二句冩景詠物可謂造㣲入妙然予見劉忠肅莘老已言之矣湖上口號云緑荷深不見湖光萬柄清風動晚凉莫恨紅葩猶未爛葉香元自勝花香服藥不如獨卧世所傳道書雜識神仙秘訣有云服藥千朝不如獨寢一宵此最有理予近讀頋况琴客詩云服藥不如獨自眠従他别嫁一少年乃知古有此語然太平廣記彭祖傳云服藥百顆不如獨卧又知道書本此繫日白樂天既無長繩繫白日又無大藥駐朱顔盖本陳沈烱幽庭那得長䋲繋白日年年月月俱如春然江捴嵗暮還宅詩亦云長䋲豈繫日濁酒傾一杯東坡作夏侯太初論王立之詩話記東坡十嵗時老蘇令作夏侯太初論其間有人能碎千金之璧不能無失聲於破釜能搏猛虎不能無變色扵蜂蠆之語老蘇愛之以少時所作故不傳然東坡作顔樂亭記與黠䑕賦凡兩次用之以上皆王記余按晉劉毅傳鄒湛曰猛獸在田荷戈而出凡人能之蜂蠆作扵懐袖勇夫為之驚駭出扵意外故也乃知東坡意發扵此杜甫取李陵詩杜詩思家歩月清宵立憶弟看雲白日眠又云别時孤雲今不飛時復看雲淚横臆盖取李陵别蘇武詩云仰視浮雲馳奄忽互相踰長當従此别且復立斯須知禰不能舉韓子蒼送王梲詩末章云虚作西清老従臣知禰才華不能舉王摩詰送邱為云知禰不能薦羞稱獻納臣董穎襲陳知黙詩洪景盧夷堅乙志記董穎詩云口壑釀成千嶂雨風蘋吹老一川秋上句盖襲陳知黙詩耳陳云雲埋山麓蔵林雨葉脫林梢帶晚風東坡本李端詩東坡詩白水滿時雙鷺下午隂清處一蟬鳴唐李端茂陵山行陪韋金部詩云盤雲雙鶴下隔水一蟬鳴東坡本此陸詩出韓子蒼韓子蒼作絶句天長候鴈作行逺沙晚浴鳬相對眠松醪朝醉復暮醉江月上弦仍下弦陸龜䝉别墅懐歸云題詩朝憶復暮憶見月上弦還下弦韓所作也得茶三昧錢塘南屏謙師妙於茶事東坡贈之詩云道人曉出南屏山来試㸃茶三昧手劉貢父亦贈詩云㵼湯舊得茶三昧覓句還窺詩一班吏部文章二百年韓子蒼言歐陽文忠公寄荆公詩云翰林風月三千首吏部文章二百年吏部盖謂南史謝眺扵宋明帝朝為尚書吏部郎長五言詩沈約嘗云二百年来無此詩也文忠之意直使謝眺事而荆公答之曰他日老能窺孟子終身安敢望韓公則荆公之意竟指吏部為退之矣裹飯非子来東坡次韻徐積詩殺雞未肯邀季路裹飯應須問子来按荘子書子杞子輿子犁子来四人相與為友然無裹飯之事荘子書又載子輿子桑友而淋雨十日子輿曰子桑殆病矣裹飯而徃食之乃知裹飯者子輿子桑非子来也東坡此詩為誤余又觀韓退之贈崔立之詩云昔者十日雨子来寒且饑其友名子輿忽然憂且思褰裳觸泥水裹飯徃食之好事漆園吏書之存雄辭然則退之亦誤用耳僧綽采蠟燭作鳳凰憶昔庚寅降屈原旋看蠟鳳戯僧䖍随翁萬里心如鐵此子何勞為置田東坡送子由奉使最後一章也時子由之子侍行故及之然蠟鳳之戯議者以為誤盖南史王曇首與兄弟集㑹子孫任其戯適僧逹跳下地作虎子僧䖍累十二博碁既不墜落落亦不重作僧綽采蠟燭作鳯凰乃知蠟鳯之戯非僧䖍也荷囊非芰荷之荷劉偉明贈熊本待制詩云西清寓直荷為橐左蜀宣風繡作衣盖南史劉杳傳着紫荷橐事見漢張安世傳持橐簮筆之意而偉明乃以荷為芰荷之荷何耶歐陽文忠囬吴舍人啓云紅藥翻堦直禁垣之清切紫荷持橐陪法従以雍容又上胥偃啓曰白蟬素簡以香生兹焉辟惡紫袷荷嚢而備問最近清光乃知誤者非一人然隋書禮志尚書録令僕射吏部尚書朝服綴紫荷録令左僕射左荷右僕射吏部尚書右荷此又何耶姑俟博識者陽燧淮南子陽燧見日則然而為火注云陽燧金也取金杯無縁者熟摩令熱日下以艾承之又云朩與朩相摩則然世之取火惟此耳劉言史與孟郊煎茶詩云敲石取鮮火汲泉避􅀈鱗石火雖火而不可然言史不察也周禮司烜氏掌以夫遂取明火扵日鄭注云夫遂陽遂也禮内則疏晴則以金燧取火扵日隂則以朩燧鑚火也禮外傳云宗廟之祭用明火者以陽鑑取日中之火謂之陽燧以冬至之日子時鑄銅為鑑陽闗圖王維送元二詩渭城朝雨裛輕塵客舍青青栁色新勸君更盡一杯酒西出陽闗無故人李伯時取以為畫謂陽闗圖予嘗以為失按漢書上黨有天井闗燉煌龍勒有玉門闗陽闗去長安二千五百里唐人送客西出都門三十里特是渭城耳今有渭城舘在焉即古之渭陽據其所畫當謂之渭城可也東坡題陽闗圖詩龍眠獨識慇懃處畫出陽闗意外聲皆承其失耳至山谷題陽闗圖斷章云渭城栁色闗何事自是離人作許悲然則詳味山谷詩意謂之渭城圖宜矣珠還合浦古今詩話羊士諤上廣守詩鱷去惡溪韓吏部珠還合浦孟嘗君殊不知珠還合浦乃後漢孟嘗也築黄金臺前輩以荆公詩功謝蕭規慚漢第恩従隗始詫燕臺以臺字為失史記云為隗改築宫而師事之然太白詩云何人為築黄金臺荆公詩本此以玉兒為玉奴東坡和楊公濟梅花詩云月地雲堦謾一尊玉奴終不負東昏又四時詩云玉奴纎手嗅梅花南史齊東昏侯妃潘玉兒有國色牛僧孺周秦行記薄太后曰牛秀才逺来誰為伴潘妃辭曰東昏侯以玉兒身死國除不擬負他注云玉兒妃小字東坡盖用此而兩以兒為奴者誤也然不害為佳句東坡用事切東坡和山谷嘲小徳詩末云但使伯仁長還興絡秀家盖伯仁乃絡秀子耳洪駒父哭謝無逸詩云但使添丁長終興謝客家此學東坡語尤無功添丁盧仝子氣骨不相屬絡秀本周伯仁父浚之妾小徳乃庶出故坡用事其切如此山谷詩觧著潜夫論不妨無外家更覺其切妓人出家詩唐頋陶大中丙子編唐詩類選載陽郇伯作妓人出家詩盡出花鈿與四隣雲鬟翦落向殘春暫驚風燭難留世便是池蓮不染身貝葉欲翻迷錦字梵聲初學誤梁塵従今艶色歸空後湘浦應無觧佩人湘山野録乃謂本朝申國長公主為尼掖廷嬪御随出家者三十餘人太宗詔兩禁各以詩送之陳彭年作詩八句今考其詩與陽郇伯所作同陳首句盡出花鈿散寳津餘句盡同豈後人改郇伯詩而託以彭年之名而文瑩又不考之過耶蒸壺似蒸鴨東坡岐亭汁字韻詩不見盧懐慎蒸壺似蒸鴨坐客皆忍笑髠然發其幕按太平廣記載盧氏雜說鄭餘慶與人㑹食日髙衆客囂然呼左右曰爛蒸去毛莫抝折項諸人相頋以為必蒸鵞鴨良久就餐每人前下粟米飯一椀蒸胡蘆一枚餘慶餐美諸人彊進而罷然則蒸壺似蒸鴨乃鄭餘慶非懐慎也豈東坡偶忘之耶望夫石陳無巳詩話望夫石在處有之古今詩人惟用一律惟劉夢得云望来况是幾千嵗只是當年初望時語雖拙而意工黄叔逹魯直之弟也以頋况為第一云山頭日日風和雨行人歸来石應語語意皆工江南望夫石毎過其下不風即雨疑况得句處也予家有王建集載望夫石詩乃知非况作其全章云望夫處江悠悠化為石不囬頭山頭日日風復雨行人歸来石應語豈無已叔逹偶㤀建作耶落梅花折楊栁樂府雜録載笛羗樂也古曲有落梅花折楊栁非謂吹之則梅落也故陳賀㣲長笛詩云栁折城邊樹梅舒嶺外林張正見栁詩亦云不分梅花落還同横笛吹李嶠笛詩逐吹梅花落含春栁色驚意謂笛有梅栁二曲也然後世皆以吹笛則梅落如戎昱聞笛詩云平明獨惆悵飛盡一庭梅崔櫓梅詩初開已入彫梁畫半落先愁玉笛吹青瑣集詩憑仗髙樓莫吹笛大家留取倚欄看皆不悟其失耳惟杜子美王渙之李太白不然杜云故園楊栁皆揺落何得愁中却盡生王云羗笛何須怨楊栁春風不度玉門闗李云黄鶴樓中吹玉笛江城五月落梅花亦謂笛有二曲也誠齋論山谷詩山谷集中有絶句云草色青青栁色黄桃花零落杏花香春風不觧吹愁却春日偏能惹恨長此唐人賈至詩也山谷特改五字耳賈云桃花歴亂杏垂香又不為吹愁又惹夢長劉子先章子厚常與劉子先定有塲屋之舊又頗相厚善隔濶十年子厚拜相亦不通問寄書誚其相忘逺引之意子先以詩謝曰故人天上有書来責我踈愚喚不囬兩處共瞻千里月十年不寄一枝梅塵泥自與雲霄隔駑馬難追徳驥才莫謂無心向門下也曾終夕望三台公得詩甚喜即召為宰屬遂遷户部侍郎優古堂詩話
