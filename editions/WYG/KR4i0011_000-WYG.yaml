body:
  text: 優古堂詩話詩文評類提要臣等謹案優古堂詩話一巻宋吳幵撰幵字正仲滁州人紹聖丁丑中宏詞科靖康中官翰林承旨與耿南仲力主割地之議卒悞國事又為金人往來傳道意旨立張邦昌而事之建炎後竄謫以死其人本不足道而所作詩話乃頗有可采其書凡一百五十四則皆記北宋人事多論詩家句律相承變化之由亦間有旁及他義者惟巻末載楊萬里一條時代殊不相及疑傳寫有訛或後人有所竄亂歟乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b981dbd9a782b0adba52f878af37acb4432a27a239d59145f1309d7168a0d352
